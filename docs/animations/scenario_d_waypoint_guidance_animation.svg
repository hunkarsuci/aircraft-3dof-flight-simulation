<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated Learjet waypoint guidance trajectory</title>
  <desc id="desc">A red aircraft marker flies through waypoint markers along a descending path.</desc>
  <rect width="920" height="260" fill="#f8fafc"/>
  <path id="path-d" d="M72 196 L238 196 L382 154 L540 120 L716 94 L850 58" fill="none" stroke="#be185d" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="16 10"/>
  <g fill="#ef4444" stroke="#991b1b" stroke-width="1.5">
    <circle cx="72" cy="196" r="6"/><circle cx="238" cy="196" r="6"/><circle cx="382" cy="154" r="6"/><circle cx="540" cy="120" r="6"/><circle cx="716" cy="94" r="6"/><circle cx="850" cy="58" r="6"/>
  </g>
  <g>
    <path d="M14 0 L-13 -8 L-8 0 L-13 8 Z" fill="#0ea5e9" stroke="#075985" stroke-width="1.5"/>
    <animateMotion dur="5.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#path-d"/>
    </animateMotion>
  </g>
  <text x="40" y="44" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Scenario D: waypoint guidance</text>
  <text x="40" y="70" font-family="Arial,sans-serif" font-size="14" fill="#475569">Waypoint transitions steer both lateral track and descent profile</text>
</svg>
