<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated F-16 zoom climb trajectory</title>
  <desc id="desc">A red aircraft marker accelerates along a shallow dash, then climbs steeply.</desc>
  <rect width="920" height="260" fill="#f8fafc"/>
  <path d="M60 206 C190 196 278 178 376 142 C470 108 562 54 704 46 C780 42 838 38 872 32" fill="none" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
  <path id="path-a" d="M60 206 C190 196 278 178 376 142 C470 108 562 54 704 46 C780 42 838 38 872 32" fill="none" stroke="#0284c7" stroke-width="4" stroke-linecap="round" stroke-dasharray="16 10"/>
  <g>
    <path d="M14 0 L-13 -8 L-8 0 L-13 8 Z" fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
    <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#path-a"/>
    </animateMotion>
  </g>
  <text x="40" y="44" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Scenario A: zoom climb</text>
  <text x="40" y="70" font-family="Arial,sans-serif" font-size="14" fill="#475569">Dash, pull up, trade speed for altitude</text>
</svg>
