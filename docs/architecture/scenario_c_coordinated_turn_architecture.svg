<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Scenario C coordinated turn system architecture</title>
  <desc id="desc">Block diagram for the F-16 coordinated turn simulation workflow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:8}.accent{fill:#e0f2fe;stroke:#0369a1}.turn{fill:#ede9fe;stroke:#7c3aed}.out{fill:#dcfce7;stroke:#15803d}.txt{font:600 16px Arial,sans-serif;fill:#0f172a}.sub{font:13px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="920" height="420"/>
  <text x="36" y="42" class="txt" font-size="22">Scenario C: F-16 Coordinated Turn</text>
  <text x="36" y="66" class="sub">Heading reversal with bank limiting and load-factor logging</text>
  <rect x="36" y="120" width="170" height="86" class="box accent"/>
  <text x="58" y="151" class="txt">Turn Setup</text>
  <text x="58" y="175" class="sub">5000 m, Mach 0.85</text>
  <text x="58" y="194" class="sub">Heading 0 to 180 deg</text>
  <rect x="264" y="86" width="170" height="86" class="box turn"/>
  <text x="286" y="117" class="txt">Heading Loop</text>
  <text x="286" y="141" class="sub">Bank command</text>
  <text x="286" y="160" class="sub">7 g limit</text>
  <rect x="264" y="226" width="170" height="74" class="box"/>
  <text x="286" y="257" class="txt">Lift Balance</text>
  <text x="286" y="281" class="sub">Altitude hold in bank</text>
  <rect x="492" y="120" width="170" height="86" class="box"/>
  <text x="514" y="151" class="txt">3DOF Solver</text>
  <text x="514" y="175" class="sub">Turn rate + drag</text>
  <text x="514" y="194" class="sub">Energy bleed</text>
  <rect x="720" y="120" width="164" height="86" class="box out"/>
  <text x="742" y="151" class="txt">Outputs</text>
  <text x="742" y="175" class="sub">Ground track</text>
  <text x="742" y="194" class="sub">Bank and g history</text>
  <path class="line" d="M206 163 H246"/>
  <path class="line" d="M434 129 C458 129 458 151 474 151"/>
  <path class="line" d="M434 263 C462 263 462 177 474 177"/>
  <path class="line" d="M662 163 H702"/>
</svg>
